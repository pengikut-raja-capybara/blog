name: Update Sitemap on gh-pages

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Generate sitemap.xml from latest content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL }}
          APP_BASE_PATH: /blog
          CONTENT_OWNER: pengikut-raja-capybara
          CONTENT_REPO: blog
          CONTENT_BRANCH: content
          CONTENT_POSTS_PATH: content/posts
          SITEMAP_OUTPUT_PATH: sitemap.xml
        run: node scripts/generate-sitemap.mjs

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Copy sitemap.xml into gh-pages
        run: cp sitemap.xml gh-pages/sitemap.xml

      - name: Commit and push if sitemap changed
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --cached --quiet; then
            echo "No sitemap changes."
            exit 0
          fi
          git commit -m "chore(seo): update sitemap.xml"
          git push
