<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || '';
        var hash = window.location.hash || '';

        // Keep the repository base path (/blog) for GitHub Pages project sites.
        var basePath = '/blog';

        if (path === basePath || path === basePath + '/' || path.indexOf(basePath + '/') !== 0) {
          window.location.replace(basePath + '/');
          return;
        }

        var fullPath = path + search + hash;

        try {
          sessionStorage.setItem('spa-redirect', fullPath);
        } catch (error) {
          // Ignore storage failures and continue with query-param fallback.
        }

        var redirectTarget = basePath + '/?p=' + encodeURIComponent(fullPath);
        window.location.replace(redirectTarget);
      })();
    </script>
  </head>
  <body></body>
</html>
